name: Daily Automated Mailing

on:
  schedule:
    # Run every 30 minutes to check if it's time to send the daily mailing
    # Based on the 'mailing_time' set in the Streamlit UI (stored in DB).
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  mailing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Mailing
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'Gemini' }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME || 'gemini-2.0-flash' }}
        run: python cron_daily.py
