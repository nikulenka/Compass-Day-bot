name: Daily Automated Mailing

on:
  schedule:
    # Run at 19:15 Serbia time (Winter: UTC+1, Summer: UTC+2)
    # Winter: 19:15 - 1 = 18:15 UTC
    # Summer: 19:15 - 2 = 17:15 UTC
    # Setting to 18:15 UTC for now.
    - cron: '15 18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  mailing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Mailing
        env:
          DB_HOST: ${{{{ secrets.DB_HOST }}}}
          DB_PORT: ${{{{ secrets.DB_PORT }}}}
          DB_USER: ${{{{ secrets.DB_USER }}}}
          DB_PASSWORD: ${{{{ secrets.DB_PASSWORD }}}}
          DB_NAME: ${{{{ secrets.DB_NAME }}}}
          GEMINI_API_KEY: ${{{{ secrets.GEMINI_API_KEY }}}}
          OPENROUTER_API_KEY: ${{{{ secrets.OPENROUTER_API_KEY }}}}
          TELEGRAM_BOT_TOKEN: ${{{{ secrets.TELEGRAM_BOT_TOKEN }}}}
          AI_PROVIDER: ${{{{ secrets.AI_PROVIDER || 'Gemini' }}}}
          AI_MODEL_NAME: ${{{{ secrets.AI_MODEL_NAME || 'gemini-2.0-flash' }}}}
        run: python cron_daily.py
