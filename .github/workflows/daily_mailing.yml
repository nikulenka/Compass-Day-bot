name: Daily Automated Mailing

on:
  schedule:
    # Run at 21:15 Serbia time (which is usually UTC+1 or UTC+2 depending on DST)
    # 21:15 Serbia = 20:15 UTC (Winter) / 19:15 UTC (Summer)
    # Adjust cron according to your preference. Here it's 20:15 UTC:
    - cron: '15 20 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  mailing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Mailing
        env:
          DB_HOST: ${{{{ secrets.DB_HOST }}}}
          DB_PORT: ${{{{ secrets.DB_PORT }}}}
          DB_USER: ${{{{ secrets.DB_USER }}}}
          DB_PASSWORD: ${{{{ secrets.DB_PASSWORD }}}}
          DB_NAME: ${{{{ secrets.DB_NAME }}}}
          GEMINI_API_KEY: ${{{{ secrets.GEMINI_API_KEY }}}}
          OPENROUTER_API_KEY: ${{{{ secrets.OPENROUTER_API_KEY }}}}
          TELEGRAM_BOT_TOKEN: ${{{{ secrets.TELEGRAM_BOT_TOKEN }}}}
          AI_PROVIDER: ${{{{ secrets.AI_PROVIDER || 'Gemini' }}}}
          AI_MODEL_NAME: ${{{{ secrets.AI_MODEL_NAME || 'gemini-2.0-flash' }}}}
        run: python cron_daily.py
